name: Deploy NestJS App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd /root/solar_backend

            # ensure repo is clean
            git reset --hard
            git pull origin main

            # install & build
            yarn install
            yarn build

            # restart pm2 safely
            pm2 restart solar-backend || pm2 start dist/src/main.js --name solar-backend

            pm2 save
